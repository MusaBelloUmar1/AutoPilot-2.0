name: AutoPilot CI/CD Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permissions for gradlew
        run: chmod +x Android/src/gradlew

      - name: Update Version Code
        run: |
          sed -i "s/versionCode = [0-9]*/versionCode = ${{ github.run_number }}/" Android/src/app/build.gradle.kts

      - name: Build Debug APK
        run: ./Android/src/gradlew -p Android/src assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AutoPilot-debug
          path: Android/src/app/build/outputs/apk/debug/app-debug.apk
